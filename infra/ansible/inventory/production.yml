---
# Production server inventory
all:
  children:
    production:
      hosts:
        prod-01:
          ansible_host: prod
          ansible_user: mz
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      vars:
        env: production
        domain: trainwithgouli.com
        cert_type: letsencrypt
        deploy_dir: /opt/trainwithgouli
        certs_dir: "{{ deploy_dir }}/certs"
        app_name: trainwithgouli
        dockerhub_username: "{{ vault_dockerhub_username | default('') }}"
        dockerhub_token: "{{ vault_dockerhub_token | default('') }}"
        supabase_url: "{{ vault_supabase_url | default('') }}"
        supabase_service_role_key: "{{ vault_supabase_service_role_key | default('') }}"
        owner_api_key: "{{ vault_owner_api_key | default('change-me') }}"
