---
# TrainWithGouli Deployment Playbook
# Deploys the Next.js frontend container with nginx proxy.
# Uses Podman secrets for sensitive data.
#
# Usage:
#   Dev:    ansible-playbook -i inventory/dev.yml playbooks/deploy.yml
#   Prod:   ansible-playbook -i inventory/production.yml playbooks/deploy.yml --ask-vault-pass

- name: Deploy TrainWithGouli
  hosts: all
  become: false

  vars:
    deploy_version: "{{ deploy_version | default('0.2.0') }}"
    frontend_image: "docker.io/muzammilmomin/trainwithgouli:frontend-v{{ deploy_version }}"
    nginx_image: "docker.io/library/nginx:1.27-alpine-slim"

  pre_tasks:
    - name: Display deployment info
      debug:
        msg:
          - "========================================="
          - "  TrainWithGouli Deployment"
          - "========================================="
          - "Environment: {{ env }}"
          - "Version: {{ deploy_version }}"
          - "Domain: {{ domain }}"
          - "========================================="

    - name: Login to Docker Hub
      containers.podman.podman_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_token }}"
        registry: docker.io
      no_log: true
      when: dockerhub_username is defined and dockerhub_username | length > 0
      ignore_errors: true

  roles:
    - role: secrets
    - role: trainwithgouli

  post_tasks:
    - name: Wait for containers to initialize
      pause:
        seconds: 10

    - name: Verify containers are running
      shell: |
        podman ps --filter "name=trainwithgouli" --format "{% raw %}{{.Names}}:{{.Status}}{% endraw %}" | grep -c "Up"
      args:
        executable: /bin/bash
      register: container_count
      retries: 6
      delay: 5
      until: container_count.stdout|int >= 2

    - name: Show container status
      shell: |
        podman ps --filter "name=trainwithgouli" --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
      args:
        executable: /bin/bash
      register: container_status
      changed_when: false

    - name: Display deployment summary
      debug:
        msg:
          - "========================================="
          - "  Deployment Complete!"
          - "========================================="
          - "Environment: {{ env }}"
          - "Version: {{ deploy_version }}"
          - "URL: https://{{ domain }}"
          - "Containers: {{ container_status.stdout_lines }}"
          - "========================================="
