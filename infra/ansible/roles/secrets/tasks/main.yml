---
# Manage Podman secrets
# Creates secrets from vault variables
# CRITICAL: All sensitive values MUST be stored as Podman secrets, NEVER as env vars

- name: Create supabase_url secret
  containers.podman.podman_secret:
    name: supabase_url
    data: "{{ vault_supabase_url }}"
    state: present
  no_log: true
  when: vault_supabase_url is defined and vault_supabase_url | length > 0

- name: Create supabase_service_role_key secret
  containers.podman.podman_secret:
    name: supabase_service_role_key
    data: "{{ vault_supabase_service_role_key }}"
    state: present
  no_log: true
  when: vault_supabase_service_role_key is defined and vault_supabase_service_role_key | length > 0

- name: Create owner_api_key secret
  containers.podman.podman_secret:
    name: owner_api_key
    data: "{{ vault_owner_api_key }}"
    state: present
  no_log: true
  when: vault_owner_api_key is defined and vault_owner_api_key | length > 0

- name: List existing secrets
  command: podman secret ls
  register: secret_list
  changed_when: false

- name: Show secrets (names only)
  debug:
    var: secret_list.stdout_lines
